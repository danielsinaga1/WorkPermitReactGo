name: arshe_mobile
description: ArSHE - Safety Management System Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP & API
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.1

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI Components
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.0

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0

  # File & Image
  image_picker: ^1.1.2

  # Dependency Injection
  get_it: ^8.0.2

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  timeago: ^3.7.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
